<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Model Context Protocol Demo</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: #333;
			line-height: 1.6;
			min-height: 100vh;
			padding: 20px;
		}

		.container {
			max-width: 1400px;
			margin: 0 auto;
		}

		header {
			text-align: center;
			color: white;
			margin-bottom: 40px;
		}

		h1 {
			font-size: 3em;
			margin-bottom: 10px;
			text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
		}

		.subtitle {
			font-size: 1.2em;
			opacity: 0.9;
		}

		.main-content {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 20px;
			margin-bottom: 20px;
		}

		.card {
			background: white;
			border-radius: 12px;
			padding: 25px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
		}

		.card h2 {
			color: #667eea;
			margin-bottom: 20px;
			font-size: 1.5em;
			border-bottom: 2px solid #667eea;
			padding-bottom: 10px;
		}

		.tool-list,
		.resource-list {
			display: flex;
			flex-direction: column;
			gap: 10px;
		}

		.tool-item,
		.resource-item {
			padding: 15px;
			background: #f7f7f7;
			border-radius: 8px;
			border-left: 4px solid #667eea;
			cursor: pointer;
			transition: all 0.3s ease;
		}

		.tool-item:hover,
		.resource-item:hover {
			background: #e9e9e9;
			transform: translateX(5px);
		}

		.tool-name,
		.resource-name {
			font-weight: bold;
			color: #333;
			margin-bottom: 5px;
		}

		.tool-description,
		.resource-description {
			font-size: 0.9em;
			color: #666;
		}

		.interaction-panel {
			grid-column: 1 / -1;
		}

		.form-group {
			margin-bottom: 15px;
		}

		label {
			display: block;
			margin-bottom: 5px;
			font-weight: 600;
			color: #333;
		}

		input,
		select,
		textarea {
			width: 100%;
			padding: 10px;
			border: 2px solid #e0e0e0;
			border-radius: 6px;
			font-size: 1em;
			font-family: inherit;
			transition: border-color 0.3s;
		}

		input:focus,
		select:focus,
		textarea:focus {
			outline: none;
			border-color: #667eea;
		}

		textarea {
			resize: vertical;
			min-height: 100px;
			font-family: "Courier New", monospace;
		}

		button {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			padding: 12px 30px;
			border: none;
			border-radius: 6px;
			font-size: 1em;
			font-weight: 600;
			cursor: pointer;
			transition: transform 0.2s, box-shadow 0.2s;
		}

		button:hover {
			transform: translateY(-2px);
			box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
		}

		button:active {
			transform: translateY(0);
		}

		.result {
			margin-top: 20px;
			padding: 20px;
			background: #f9f9f9;
			border-radius: 8px;
			border-left: 4px solid #4caf50;
		}

		.result h3 {
			color: #4caf50;
			margin-bottom: 10px;
		}

		.result pre {
			background: #2d2d2d;
			color: #f8f8f2;
			padding: 15px;
			border-radius: 6px;
			overflow-x: auto;
			font-size: 0.9em;
		}

		.error {
			border-left-color: #f44336;
		}

		.error h3 {
			color: #f44336;
		}

		.loading {
			display: inline-block;
			width: 20px;
			height: 20px;
			border: 3px solid rgba(255, 255, 255, .3);
			border-radius: 50%;
			border-top-color: white;
			animation: spin 1s ease-in-out infinite;
			margin-left: 10px;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}

		.hidden {
			display: none;
		}

		.badge {
			display: inline-block;
			padding: 3px 8px;
			background: #667eea;
			color: white;
			border-radius: 4px;
			font-size: 0.8em;
			margin-left: 8px;
		}

		@media (max-width: 768px) {
			.main-content {
				grid-template-columns: 1fr;
			}

			h1 {
				font-size: 2em;
			}
		}
	</style>
</head>

<body>
	<div class="container">
		<header>
			<h1>🤖 Model Context Protocol Demo</h1>
			<p class="subtitle">Interactive demonstration of MCP tools and resources</p>
		</header>

		<div class="main-content">
			<!-- Tools Section -->
			<div class="card">
				<h2>🔧 Available Tools</h2>
				<div id="tools-list" class="tool-list">
					<p>Loading tools...</p>
				</div>
			</div>

			<!-- Resources Section -->
			<div class="card">
				<h2>📚 Available Resources</h2>
				<div id="resources-list" class="resource-list">
					<p>Loading resources...</p>
				</div>
			</div>

			<!-- Interaction Panel -->
			<div class="card interaction-panel">
				<h2>⚡ Interact with MCP</h2>

				<div class="form-group">
					<label for="action-type">Action Type:</label>
					<select id="action-type">
						<option value="tool">Call Tool</option>
						<option value="resource">Read Resource</option>
					</select>
				</div>

				<div id="tool-section">
					<div class="form-group">
						<label for="tool-name">Tool Name:</label>
						<input type="text" id="tool-name" placeholder="e.g., calculate">
					</div>

					<div class="form-group">
						<label for="tool-args">Arguments (JSON):</label>
						<textarea id="tool-args" placeholder='{"expression": "2 + 2"}'></textarea>
					</div>

					<button onclick="callTool()">Execute Tool</button>
				</div>

				<div id="resource-section" class="hidden">
					<div class="form-group">
						<label for="resource-uri">Resource URI:</label>
						<input type="text" id="resource-uri" placeholder="e.g., mcp://demo/system-info">
					</div>

					<button onclick="readResource()">Read Resource</button>
				</div>

				<div id="result-container"></div>
			</div>
		</div>
	</div>

	<script>
		// Load tools on page load
		async function loadTools() {
			try {
				const response = await fetch("/api/tools");
				const data = await response.json();

				if (data.success) {
					const toolsList = document.getElementById("tools-list");
					toolsList.innerHTML = "";

					data.tools.forEach(tool => {
						const toolItem = document.createElement("div");
						toolItem.className = "tool-item";
						toolItem.innerHTML = `
              <div class="tool-name">${tool.name}<span class="badge">Tool</span></div>
              <div class="tool-description">${tool.description}</div>
            `;
						toolItem.onclick = () => selectTool(tool);
						toolsList.appendChild(toolItem);
					});
				}
			} catch (error) {
				console.error("Error loading tools:", error);
				document.getElementById("tools-list").innerHTML = "<p>Error loading tools</p>";
			}
		}

		// Load resources on page load
		async function loadResources() {
			try {
				const response = await fetch("/api/resources");
				const data = await response.json();

				if (data.success) {
					const resourcesList = document.getElementById("resources-list");
					resourcesList.innerHTML = "";

					data.resources.forEach(resource => {
						const resourceItem = document.createElement("div");
						resourceItem.className = "resource-item";
						resourceItem.innerHTML = `
              <div class="resource-name">${resource.name}<span class="badge">Resource</span></div>
              <div class="resource-description">${resource.description}</div>
            `;
						resourceItem.onclick = () => selectResource(resource);
						resourcesList.appendChild(resourceItem);
					});
				}
			} catch (error) {
				console.error("Error loading resources:", error);
				document.getElementById("resources-list").innerHTML = "<p>Error loading resources</p>";
			}
		}

		// Select a tool (auto-fill form)
		function selectTool(tool) {
			document.getElementById("action-type").value = "tool";
			toggleActionType();
			document.getElementById("tool-name").value = tool.name;

			// Provide example arguments based on tool
			const examples = {
				"calculate": '{"expression": "2 + 2"}',
				"get_weather": '{"location": "San Francisco", "unit": "celsius"}',
				"store_note": '{"title": "Test Note", "content": "This is a test", "tags": ["test"]}',
				"retrieve_notes": '{"query": "test"}',
				"generate_uuid": "{}"
			};

			document.getElementById("tool-args").value = examples[tool.name] || "{}";
		}

		// Select a resource (auto-fill form)
		function selectResource(resource) {
			document.getElementById("action-type").value = "resource";
			toggleActionType();
			document.getElementById("resource-uri").value = resource.uri;
		}

		// Toggle between tool and resource sections
		function toggleActionType() {
			const actionType = document.getElementById("action-type").value;
			const toolSection = document.getElementById("tool-section");
			const resourceSection = document.getElementById("resource-section");

			if (actionType === "tool") {
				toolSection.classList.remove("hidden");
				resourceSection.classList.add("hidden");
			} else {
				toolSection.classList.add("hidden");
				resourceSection.classList.remove("hidden");
			}
		}

		// Call a tool
		async function callTool() {
			const toolName = document.getElementById("tool-name").value;
			const toolArgsText = document.getElementById("tool-args").value;
			const resultContainer = document.getElementById("result-container");

			try {
				const toolArgs = JSON.parse(toolArgsText);

				resultContainer.innerHTML = "<p>Executing tool<span class=\"loading\"></span></p>";

				const response = await fetch("/api/tools/call", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({
						name: toolName,
						arguments: toolArgs
					})
				});

				const data = await response.json();

				if (data.success) {
					resultContainer.innerHTML = `
            <div class="result">
              <h3>✅ Success</h3>
              <pre>${JSON.stringify(data.result, null, 2)}</pre>
            </div>
          `;
				} else {
					throw new Error(data.error);
				}
			} catch (error) {
				resultContainer.innerHTML = `
          <div class="result error">
            <h3>❌ Error</h3>
            <pre>${error.message}</pre>
          </div>
        `;
			}
		}

		// Read a resource
		async function readResource() {
			const resourceUri = document.getElementById("resource-uri").value;
			const resultContainer = document.getElementById("result-container");

			try {
				resultContainer.innerHTML = "<p>Reading resource<span class=\"loading\"></span></p>";

				const response = await fetch(`/api/resources/read?uri=${encodeURIComponent(resourceUri)}`);
				const data = await response.json();

				if (data.success) {
					resultContainer.innerHTML = `
            <div class="result">
              <h3>✅ Success</h3>
              <pre>${JSON.stringify(data.contents, null, 2)}</pre>
            </div>
          `;
				} else {
					throw new Error(data.error);
				}
			} catch (error) {
				resultContainer.innerHTML = `
          <div class="result error">
            <h3>❌ Error</h3>
            <pre>${error.message}</pre>
          </div>
        `;
			}
		}

		// Event listener for action type change
		document.getElementById("action-type").addEventListener("change", toggleActionType);

		// Load data on page load
		window.addEventListener("load", () => {
			loadTools();
			loadResources();
		});
	</script>
</body>

</html>
